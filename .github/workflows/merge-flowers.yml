name: 合并献花数据

on:
  schedule:
    - cron: '0 2 * * 0'  # 每周日凌晨2点
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  merge-flowers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 统计 Issues 中的献花
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const apis = JSON.parse(fs.readFileSync('data/apis.json', 'utf8'));
            const apiMap = Object.fromEntries(apis.map(a => [a.id, a]));

            // 查找带 "献花" 标签的 issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'flower',
              state: 'open',
              per_page: 100
            });

            let updated = false;
            for (const issue of issues.data) {
              // Issue 标题格式: flower:api-id:count
              const match = issue.title.match(/^flower:(\S+):(\d+)$/);
              if (match) {
                const [, id, count] = match;
                if (apiMap[id]) {
                  apiMap[id].flowers += parseInt(count);
                  updated = true;
                  // 关闭已处理的 issue
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    state: 'closed'
                  });
                }
              }
            }

            if (updated) {
              fs.writeFileSync('data/apis.json', JSON.stringify(apis, null, 2) + '\n');
              console.log('献花数据已更新');
            } else {
              console.log('没有新的献花数据');
            }

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/apis.json
          git diff --cached --quiet || git commit -m "chore: 合并社区献花数据"
          git push
