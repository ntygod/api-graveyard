<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 墓地 - R.I.P. 那些离我们而去的 API</title>
  <meta name="description" content="纪念那些曾经辉煌、如今已逝的 API 和服务。献一束花，缅怀它们。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪦</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="fog"></div>

  <header>
    <h1>🪦 API 墓地</h1>
    <p class="subtitle">纪念那些曾经辉煌、如今已逝的 API 和服务</p>
    <div class="stats" id="stats"></div>
  </header>

  <nav class="controls">
    <div class="search-box">
      <input type="text" id="search" placeholder="搜索 API 名称、公司、标签...">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">全部墓碑</button>
      <button class="filter-btn" data-filter="killer">杀手排行榜</button>
      <button class="filter-btn" data-filter="most-mourned">最受哀悼</button>
      <button class="filter-btn" data-filter="endangered">⚠️ 濒危</button>
    </div>
    <div class="sort-options">
      <select id="sort">
        <option value="died-desc">最近去世</option>
        <option value="died-asc">最早去世</option>
        <option value="flowers-desc">献花最多</option>
        <option value="name-asc">名称 A-Z</option>
      </select>
    </div>
  </nav>

  <main>
    <section id="graveyard" class="graveyard"></section>
    <section id="killer-board" class="killer-board hidden"></section>
    <section id="most-mourned" class="most-mourned hidden"></section>
    <section id="endangered" class="endangered hidden"></section>
  </main>

  <!-- 墓碑详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- 分享图片 canvas (隐藏) -->
  <canvas id="share-canvas" width="600" height="400" style="display:none;"></canvas>

  <!-- 提交讣告弹窗 -->
  <div class="modal-overlay" id="submit-overlay">
    <div class="modal" id="submit-modal">
      <button class="modal-close" id="submit-close">&times;</button>
      <h2 style="color:var(--text-bright);font-weight:400;margin-bottom:20px;">🪦 提交讣告</h2>
      <form id="submit-form">
        <div class="form-row">
          <div class="form-group">
            <label>API 名称 *</label>
            <input type="text" name="name" required placeholder="如: Google Reader API">
          </div>
          <div class="form-group">
            <label>图标 Emoji</label>
            <input type="text" name="icon" placeholder="如: 📖" maxlength="4">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>出生年份 *</label>
            <input type="text" name="born" required placeholder="如: 2005">
          </div>
          <div class="form-group">
            <label>死亡日期 *</label>
            <input type="text" name="died" required placeholder="如: 2023-07-01">
          </div>
        </div>
        <div class="form-group">
          <label>凶手 (公司/组织) *</label>
          <input type="text" name="killedBy" required placeholder="如: Google">
        </div>
        <div class="form-group">
          <label>死因 *</label>
          <textarea name="cause" required placeholder="简述为什么它死了..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>遗言 (官方最后声明)</label>
          <textarea name="lastWords" placeholder="官方的最后一句话..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>墓志铭 *</label>
          <input type="text" name="epitaph" required placeholder="一句话总结它的一生">
        </div>
        <div class="form-group">
          <label>受影响者</label>
          <input type="text" name="dependents" placeholder="哪些项目/用户受到了影响">
        </div>
        <div class="form-group">
          <label>标签 (逗号分隔)</label>
          <input type="text" name="tags" placeholder="如: google, rss, 经典">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-submit">📋 生成并跳转到 GitHub Issue</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p>你知道某个已经死去的 API 吗？<a href="#" id="open-submit">提交讣告</a></p>
    <p class="footer-note">数据来源于公开信息 · 献花数据保存在本地浏览器 · 社区献花通过 GitHub Actions 定期合并</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
