<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API 墓地 - R.I.P. 那些离我们而去的 API</title>
  <meta name="description" content="纪念那些曾经辉煌、如今已逝的 API 和服务。献一束花，缅怀它们。">
  <!-- Open Graph -->
  <meta property="og:title" content="API Graveyard - R.I.P. APIs We Lost">
  <meta property="og:description" content="40+ tombstones for dead APIs. Leave flowers, see the killer ranking, and check the endangered watchlist.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ntygod.github.io/api-graveyard/">
  <meta property="og:image" content="https://ntygod.github.io/api-graveyard/og-image.svg">
  <meta property="og:locale" content="zh_CN">
  <meta property="og:locale:alternate" content="en_US">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="🪦 API Graveyard - R.I.P.">
  <meta name="twitter:description" content="40+ tombstones for dead APIs. Leave flowers, killer ranking, endangered watchlist.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪦</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="fog"></div>

  <!-- 语言切换 -->
  <button class="lang-switch" id="lang-switch" title="Switch Language">🇨🇳/🇬🇧</button>

  <header>
    <h1 id="h-title"></h1>
    <p class="subtitle" id="h-subtitle"></p>
    <div class="stats" id="stats"></div>
  </header>

  <nav class="controls">
    <div class="search-box">
      <input type="text" id="search" placeholder="">
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all" id="f-all"></button>
      <button class="filter-btn" data-filter="killer" id="f-killer"></button>
      <button class="filter-btn" data-filter="most-mourned" id="f-mourned"></button>
      <button class="filter-btn" data-filter="endangered" id="f-endangered"></button>
      <button class="filter-btn" data-filter="timeline" id="f-timeline"></button>
      <button class="filter-btn" data-filter="stats" id="f-stats"></button>
    </div>
    <div class="sort-options">
      <select id="sort">
        <option value="died-desc" id="s-died-desc"></option>
        <option value="died-asc" id="s-died-asc"></option>
        <option value="flowers-desc" id="s-flowers"></option>
        <option value="name-asc" id="s-name"></option>
      </select>
    </div>
  </nav>

  <main>
    <section id="graveyard" class="graveyard"></section>
    <section id="killer-board" class="killer-board hidden"></section>
    <section id="most-mourned" class="most-mourned hidden"></section>
    <section id="endangered" class="endangered hidden"></section>
    <section id="timeline" class="timeline-view hidden"></section>
    <section id="stats-view" class="stats-view hidden"></section>
  </main>

  <!-- 返回顶部 -->
  <button class="back-to-top" id="back-to-top" title="">↑</button>

  <!-- 墓碑详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- 分享图片 canvas (隐藏) -->
  <canvas id="share-canvas" width="600" height="400" style="display:none;"></canvas>

  <!-- 提交讣告弹窗 -->
  <div class="modal-overlay" id="submit-overlay">
    <div class="modal" id="submit-modal">
      <button class="modal-close" id="submit-close">&times;</button>
      <h2 style="color:var(--text-bright);font-weight:400;margin-bottom:20px;" id="submit-title"></h2>
      <form id="submit-form">
        <div class="form-row">
          <div class="form-group">
            <label id="fl-name"></label>
            <input type="text" name="name" required placeholder="" id="fi-name">
          </div>
          <div class="form-group">
            <label id="fl-icon"></label>
            <input type="text" name="icon" placeholder="" maxlength="4" id="fi-icon">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label id="fl-born"></label>
            <input type="text" name="born" required placeholder="" id="fi-born">
          </div>
          <div class="form-group">
            <label id="fl-died"></label>
            <input type="text" name="died" required placeholder="" id="fi-died">
          </div>
        </div>
        <div class="form-group">
          <label id="fl-killer"></label>
          <input type="text" name="killedBy" required placeholder="" id="fi-killer">
        </div>
        <div class="form-group">
          <label id="fl-cause"></label>
          <textarea name="cause" required placeholder="" rows="2" id="fi-cause"></textarea>
        </div>
        <div class="form-group">
          <label id="fl-lastwords"></label>
          <textarea name="lastWords" placeholder="" rows="2" id="fi-lastwords"></textarea>
        </div>
        <div class="form-group">
          <label id="fl-epitaph"></label>
          <input type="text" name="epitaph" required placeholder="" id="fi-epitaph">
        </div>
        <div class="form-group">
          <label id="fl-dependents"></label>
          <input type="text" name="dependents" placeholder="" id="fi-dependents">
        </div>
        <div class="form-group">
          <label id="fl-tags"></label>
          <input type="text" name="tags" placeholder="" id="fi-tags">
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-submit" id="submit-btn"></button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <p><span id="footer-text"></span><a href="#" id="open-submit"></a></p>
    <p class="footer-note" id="footer-note"></p>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
